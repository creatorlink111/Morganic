name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install node deps
        run: npm ci
        working-directory: node
      - name: Install python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
        working-directory: python
      - name: Run python tests (includes examples + cross-runtime conformance)
        run: pytest -q
        working-directory: python

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run rust tests
        run: cargo test -q
        working-directory: rust

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
        working-directory: node
      - name: Run node tests
        run: npm test
        working-directory: node
